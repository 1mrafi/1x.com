<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>1XDP.COM | Trusted Agent Portal</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet" />

<style>
body {
    font-family: 'Hind Siliguri', sans-serif;
    background: #020617;
    color: #fff;
    min-height: 100vh;
    padding: 20px;
    margin: 0;
    overflow-x: hidden;
}

/* glow */
.bg-glow{
    position:fixed;
    width:300px;
    height:300px;
    background:radial-gradient(circle, rgba(34,211,238,0.12) 0%, transparent 70%);
    border-radius:50%;
    filter:blur(60px);
    z-index:-1;
    animation:move 20s infinite alternate;
}
@keyframes move{
    0%{transform:translate(-30%,-30%)}
    100%{transform:translate(30%,30%)}
}

/* glass card */
.glass-card{
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px;
    box-shadow: 0 50px 100px -20px rgba(0,0,0,0.9);
}

/* input */
.input-style{
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
}
.input-style:focus{
    border-color:#22d3ee;
    box-shadow:0 0 15px rgba(34,211,238,0.25);
    background:rgba(34,211,238,0.05);
    outline:none;
}

/* tab */
.active-tab{
    background: linear-gradient(135deg,#0891b2,#2563eb);
    color:white;
}

/* marquee */
.marquee-container{
    overflow:hidden;
    white-space:nowrap;
    background:rgba(34,211,238,0.05);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:50px;
    padding:10px 0;
}
.animate-scroll{
    display:inline-block;
    animation:scroll 15s linear infinite;
}
@keyframes scroll{
    0%{transform:translateX(100%)}
    100%{transform:translateX(-100%)}
}

/* toast */
#toast{
    position:fixed;
    bottom:30px;
    left:20px;
    background:rgba(15,23,42,0.95);
    border:1px solid rgba(34,211,238,0.3);
    padding:12px 18px;
    border-radius:18px;
    font-size:12px;
    z-index:9999;
    display:none;
}

button:active{transform:scale(0.97);}
.loading{opacity:0.7;pointer-events:none;}

.success-flash{
    animation:flash 0.6s ease;
}
@keyframes flash{
    0%{background:#2563eb}
    50%{background:#22c55e}
    100%{background:#2563eb}
}

.italic-block{
    font-style: italic;
}
</style>
</head>

<body>

<div class="bg-glow" style="top:-5%;left:-5%"></div>
<div class="bg-glow" style="bottom:5%;right:-5%"></div>

<div id="toast"></div>

<div class="marquee-container mb-4 italic-block">
  <div class="animate-scroll text-cyan-400 text-[10px] font-bold uppercase">
    🔥1x_4582805 প্রোমোকোড ব্যাবহার করলে পাবেন ৫% ডিপোজিট বোনাস। ২৪ ঘন্টা ডিপোজিট/উইথড্র এভাইলেবল।
  </div>
</div>

<div class="glass-card p-6 md:p-10">

  <div class="text-center mb-6 italic-block">
    <p class="text-[9px] text-gray-400 uppercase">
      Official Agent Portal
    </p>

    <h2 class="text-4xl font-black">
      <span class="text-white">1X</span>
      <span class="text-cyan-400">DP.COM</span>
    </h2>

    <div class="mt-3">
      <span class="text-[8px] text-gray-400 uppercase font-bold tracking-[0.2em] mb-1 block">
        Click to Copy Promo Code
      </span>

      <div id="promo-box" class="cursor-pointer bg-gradient-to-r from-cyan-500/20 to-blue-500/20 px-4 py-1.5 rounded-lg border border-cyan-500/30">
        <span id="promo-text" class="text-base font-black text-white tracking-widest uppercase">
          1x_4582805
        </span>
      </div>

      <p class="text-[8px] font-bold text-cyan-500 uppercase mt-2 tracking-widest">
        200% Bonus Guaranteed
      </p>
    </div>
  </div>

  <form id="mainForm">

    <div class="flex bg-black/40 p-1 rounded-2xl mb-4">
      <button type="button" id="dep-btn" onclick="toggleMode('deposit')" class="w-1/2 py-3 rounded-xl font-bold active-tab">
        ডিপোজিট
      </button>

      <button type="button" id="with-btn" onclick="toggleMode('withdraw')" class="w-1/2 py-3 rounded-xl font-bold">
        উইথড্র
      </button>
    </div>

    <div id="withdraw-addr-box" class="hidden bg-cyan-500/10 border border-cyan-500/30 p-4 rounded-xl text-center mb-4">
      <p class="text-cyan-400 font-bold text-xs uppercase tracking-widest mb-2">
        Withdraw Location
      </p>
      <p class="text-xs font-bold text-white">
        City: <span class="text-cyan-400">Bogra</span>
      </p>
      <p class="text-xs font-bold text-white">
        Street: <span class="text-cyan-400">Mina Bazar 555 BDT Sonapur</span>
      </p>
    </div>

    <input id="playerId" type="number" placeholder="Player ID" class="w-full p-4 input-style mb-3">

    <div class="grid grid-cols-3 gap-2 mb-3 text-xs text-center">
      <label><input type="radio" name="method" value="bkash"> bKash</label>
      <label><input type="radio" name="method" value="nagad"> Nagad</label>
      <label><input type="radio" name="method" value="rocket"> Rocket</label>
    </div>

    <div id="agent-box" class="hidden text-center mb-3">
      <span id="display-number" class="text-cyan-400 font-bold">01330035019</span>
    </div>

    <input id="amount" type="number" placeholder="৳ Amount" class="w-full p-4 input-style mb-3">
    <input id="dyn-input" placeholder="TrxID" class="w-full p-4 input-style mb-3">

    <div id="user-phone-box" class="hidden">
      <input id="userPhone" type="number" placeholder="Your Number" class="w-full p-4 input-style mb-3">
    </div>

    <button id="submitBtn" class="w-full p-4 rounded-xl bg-gradient-to-r from-cyan-600 to-blue-600 font-bold">
      Submit
    </button>

  </form>
</div>

<script>

let currentMode = "deposit";
let orderCounter = 1;

const agentNumbers={
 bkash:"01330035019",
 nagad:"01330035019",
 rocket:""
};

function toggleMode(type){
 currentMode = type;

 const depBtn=document.getElementById('dep-btn');
 const withBtn=document.getElementById('with-btn');
 const agentBox=document.getElementById('agent-box');
 const userPhone=document.getElementById('user-phone-box');
 const addr=document.getElementById('withdraw-addr-box');
 const dyn=document.getElementById('dyn-input');

 if(type==='deposit'){
   depBtn.classList.add('active-tab');
   withBtn.classList.remove('active-tab');
   agentBox.classList.remove('hidden');
   userPhone.classList.add('hidden');
   addr.classList.add('hidden');
   dyn.placeholder="TrxID";
 }else{
   withBtn.classList.add('active-tab');
   depBtn.classList.remove('active-tab');
   agentBox.classList.add('hidden');
   userPhone.classList.remove('hidden');
   addr.classList.remove('hidden');
   dyn.placeholder="W-Code";
 }
}

function getTime(){
 const now = new Date();
 let hours = now.getHours();
 const minutes = now.getMinutes().toString().padStart(2,'0');
 const ampm = hours >= 12 ? 'PM' : 'AM';
 hours = hours % 12 || 12;
 return `${hours}:${minutes} ${ampm}`;
}

function showToast(msg){
 const toast=document.getElementById("toast");
 toast.innerText=msg;
 toast.style.display="block";
 setTimeout(()=>toast.style.display="none",2000);
}

document.getElementById("mainForm").addEventListener("submit",function(e){
 e.preventDefault();

 const btn=document.getElementById("submitBtn");
 btn.classList.add("loading");

 const playerId = document.getElementById("playerId").value;
 const amount = document.getElementById("amount").value;
 const trx = document.getElementById("dyn-input").value;
 const phone = document.getElementById("userPhone")?.value || "N/A";
 const method = document.querySelector('input[name="method"]:checked')?.value.toUpperCase() || "N/A";

 let message = "";

 if(currentMode === "deposit"){
   message = `✅ 🔔 নতুন ডিপোজিট রিকোয়েস্ট

🆔 Order ID: #${orderCounter}
👤 Player ID: ${playerId}
💰 Amount: ${amount} BDT
💳 Method: ${method}
🔑 TrxID: ${trx}

⏰ Time: ${getTime()}`;
 } else {
   message = `✅ 📤 নতুন উইথড্র রিকোয়েস্ট

🆔 Order ID: #${orderCounter}
👤 Player ID: ${playerId}
💰 Amount: ${amount} BDT
💳 Method: ${method}
🔑 Withdraw Code: ${trx}
📱 User Phone: ${phone}

⏰ Time: ${getTime()}`;
 }

 orderCounter++;

 fetch(`https://api.telegram.org/bot8665196208:AAFExW9JTHpJOHAsiVn_V5TR5i7z0hRgKH8/sendMessage`,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     chat_id:"8406979793",
     text: message
   })
 });

 // SUCCESS UI + COUNTDOWN
 btn.innerText="Success ✓";
 btn.classList.add("success-flash");
 btn.disabled = true;

 let countdown = 60;

 const interval = setInterval(()=>{
   countdown--;
   btn.innerText = `Wait ${countdown}s`;

   if(countdown <= 0){
     clearInterval(interval);
     btn.disabled = false;
     btn.innerText = "Submit";
     btn.classList.remove("loading");
     btn.classList.remove("success-flash");
   }
 },1000);

 // RESET FORM
 document.getElementById("mainForm").reset();

 showToast("Submitted Successfully!");

});

</script>

</body>
</html>
